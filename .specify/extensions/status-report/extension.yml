schema_version: "1.0"

extension:
  id: "status-report"
  name: "Status Report"
  version: "1.2.5"
  description: "Project status, feature progress, and next-action recommendations for spec-driven workflows."
  author: "Open-Agent-Tools"
  repository: "https://github.com/Open-Agent-Tools/spec-kit-status"
  license: "MIT"
  homepage: "https://github.com/Open-Agent-Tools/spec-kit-status"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.status-report.show"
      file: "commands/show.md"
      description: "Display project status and feature progress"

tags:
  - "workflow"
  - "project-management"
  - "status"
