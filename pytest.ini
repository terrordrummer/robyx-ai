[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    # discord.py imports deprecated audioop (removed in 3.13) — external dep, not actionable
    ignore:.*audioop.*:DeprecationWarning:discord.player
    # AsyncMock internals create unawaited coroutines during __init__ — CPython mock issue
    ignore::RuntimeWarning:unittest.mock
